general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = your_wallpaper
    blur_passes = 1 
    blur_size = 9
    noise = 0.0117
    contrast = 1.0
    brightness = 0.7
}

label {
    monitor =
    text = $TIME
    color = rgba(242, 243, 241, 0.75)
    font_size = 120
    font_family = JetBrains Mono Nerd Font Bold
    position = 0, 300
    halign = center
    valign = center
}


label {
    monitor =
    text = Привет, $USER
    color = rgba(242, 243, 241, 0.75)
    font_size = 24
    font_family = JetBrains Mono Nerd Font
    position = 0, 180
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 300, 60
    outline_thickness = 4
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34) 
    placeholder_text = <span foreground="##ffffff66">Введите пароль...</span>
    hide_input = false
    position = 0, -50
    halign = center
    valign = center
}

label {
    monitor =
    text =   $LAYOUT
    color = rgba(242, 243, 241, 0.5)
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = 30, 30
    halign = left
    valign = bottom
}

label {
    monitor =
    text = cmd[update:5000] echo "󰍛 $(top -bn1 | grep 'Cpu(s)' | awk '{print 100 - $8}')% |  $(sensors | grep 'Tctl' | awk '{print $2}' || echo 'N/A')"
    color = rgba(242, 243, 241, 0.5)
    font_size = 14
    font_family = JetBrains Mono Nerd Font
    position = -30, 30
    halign = right
    valign = bottom
}
